<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}} — Xiaozhen Wu</title>
    <link rel="stylesheet" href="../assets/css/simple.css">
    <style>
        .lang-switch {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 0.85em;
        }
        .lang-switch a {
            display: inline-block;
            padding: 3px 10px;
            margin-left: 4px;
            border: 1px solid #ccc;
            border-radius: 3px;
            color: #555;
            text-decoration: none;
            cursor: pointer;
        }
        .lang-switch a.active {
            background: #3498db;
            color: #fff;
            border-color: #3498db;
        }
        .lang-switch a:hover:not(.active) {
            background: #eee;
        }
        body { position: relative; }
        @media (max-width: 600px) {
            .lang-switch {
                position: static;
                text-align: center;
                margin-bottom: 1em;
            }
        }
    </style>
</head>
<body>

<div class="lang-switch">
    <a onclick="switchLang('zh')" id="btn-zh">中</a>
    <a onclick="switchLang('en')" id="btn-en">EN</a>
</div>

<div class="center">
    <h1><a href="../index.html" style="color:inherit;text-decoration:none;">Xiaozhen Wu</a></h1>
</div>

<ul class="links">
    <li><a href="../index.html">[Home]</a></li>
    <li><a href="./">[Blog]</a></li>
    <li><a href="mailto:wxzher@outlook.com">[Email]</a></li>
</ul>

<hr>

<div class="post-header">
    <h2>{{TITLE}}</h2>
    <span class="post-date">{{DATE}}</span>
</div>

<div class="post-body">
{{CONTENT}}
</div>

<p class="back-link"><a href="index.html"><span class="zh">← 返回博客</span><span class="en">← Back to blog</span></a></p>

<script>
function switchLang(lang) {
    localStorage.setItem('lang', lang);
    applyLang(lang);
}

function applyLang(lang) {
    var show = lang === 'zh' ? '.zh' : '.en';
    var hide = lang === 'zh' ? '.en' : '.zh';
    document.querySelectorAll(show).forEach(function(el) { el.style.display = ''; });
    document.querySelectorAll(hide).forEach(function(el) { el.style.display = 'none'; });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
}

applyLang(localStorage.getItem('lang') || 'zh');
</script>

</body>
</html>
